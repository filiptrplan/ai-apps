<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Climbing Tracker</title>
  <meta name="description" content="Track climbing exercises, routines and workout history, offline-first.">
  <link rel="manifest" href="./climbing-tracker/manifest.json">
  <link rel="icon" href="./climbing-tracker/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./climbing-tracker/icon.svg">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Climbing">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    html,body,#app{margin:0;min-height:100%}
    body{background:#111}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./climbing-tracker-app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./climbing-tracker-sw.js", { scope: "./climbing-tracker" });
      });
    }
  </script>
</body>
</html>
